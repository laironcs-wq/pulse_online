        async function copyMessageText(content) {
            try {
                await navigator.clipboard.writeText(content || '');
                showModal('Скопировано', 'Текст сообщения скопирован.');
            } catch (e) {
                showModal('Ошибка', 'Не удалось скопировать текст.');
            }
        }

        function renderComposerState() {
            const stateEl = document.getElementById('composer-state');
            const input = document.getElementById('message-input');
            if (!stateEl || !input) return;
            const defaultPlaceholder = input.dataset.defaultPlaceholder || 'Сообщение (до 200 символов)';

            if (editingMessageId) {
                stateEl.classList.remove('hidden');
                stateEl.innerHTML = `
                    <div>
                        <p class="text-xs text-primary">Редактирование сообщения</p>
                    </div>
                    <button type="button" class="text-slate-400 text-sm" onclick="cancelComposeState()">✕</button>
                `;
                input.placeholder = 'Изменить сообщение...';
                return;
            }

            if (replyingToMessage) {
                stateEl.classList.remove('hidden');
                stateEl.innerHTML = `
                    <div class="min-w-0">
                        <p class="text-xs text-primary">Ответ ${replyingToMessage.senderName}</p>
                        <p class="text-xs text-slate-300 truncate">${replyingToMessage.content}</p>
                    </div>
                    <button type="button" class="text-slate-400 text-sm" onclick="cancelComposeState()">✕</button>
                `;
                input.placeholder = 'Ответ...';
                return;
            }

            stateEl.classList.add('hidden');
            stateEl.innerHTML = '';
            input.placeholder = defaultPlaceholder;
        }

        function cancelComposeState() {
            editingMessageId = null;
            replyingToMessage = null;
            renderComposerState();
        }

        function startMessageHold(event, messageId, content, isOutgoing, senderName, messageType = 'text') {
            cancelMessageHold();
            messageHoldTimer = setTimeout(() => {
                showMessageContextMenu(event.clientX, event.clientY, { messageId, content, isOutgoing, senderName, messageType });
            }, 450);
        }

        function cancelMessageHold() {
            if (messageHoldTimer) {
                clearTimeout(messageHoldTimer);
                messageHoldTimer = null;
            }
        }

        function showMessageContextMenu(x, y, messageData) {
            const menu = document.getElementById('message-context-menu');
            if (!menu) return;
            const buttons = [];
            const reactionsRow = `
                <div class="reaction-picker-row">
                    ${REACTION_EMOJIS.map(e => `<button onclick="setMessageReaction('${messageData.messageId}', '${e}')">${e}</button>`).join('')}
                </div>
            `;
            buttons.push(`<button onclick="handleContextCopy('${messageData.content.replace(/'/g, "\\'")}')">Копировать</button>`);
            buttons.push(`<button onclick="handleContextReply('${messageData.messageId}', '${messageData.content.replace(/'/g, "\\'")}', '${messageData.senderName.replace(/'/g, "\\'")}')">Ответить</button>`);
            if (messageData.messageType !== 'system' && messageData.messageType !== 'system_gift') {
                buttons.push(`<button onclick="handleContextForward('${messageData.messageId}')">Переслать</button>`);
            }
            if (messageData.isOutgoing) {
                buttons.push(`<button onclick="handleContextEdit('${messageData.messageId}', '${messageData.content.replace(/'/g, "\\'")}')">Изменить</button>`);
                buttons.push(`<button onclick="handleContextDelete('${messageData.messageId}')">Удалить</button>`);
            }
            menu.innerHTML = `${reactionsRow}${buttons.join('')}`;
            menu.style.left = `${Math.max(8, x - 20)}px`;
            menu.style.top = `${Math.max(8, y - 20)}px`;
            menu.classList.remove('hidden');
        }

        function hideMessageContextMenu() {
            const menu = document.getElementById('message-context-menu');
            if (!menu) return;
            menu.classList.add('hidden');
        }

        function handleContextCopy(content) {
            hideMessageContextMenu();
            copyMessageText(content);
        }

        function handleContextReply(messageId, content, senderName) {
            hideMessageContextMenu();
            replyingToMessage = { messageId, content, senderName };
            editingMessageId = null;
            renderComposerState();
        }

        function handleContextEdit(messageId, currentContent) {
            hideMessageContextMenu();
            editingMessageId = messageId;
            replyingToMessage = null;
            const input = document.getElementById('message-input');
            if (input) {
                input.value = currentContent;
                input.focus();
            }
            renderComposerState();
        }

        function handleContextDelete(messageId) {

            confirmDeleteMessage(messageId);
        }

        async function handleContextForward(messageId) {

            showForwardChatPicker(messageId);
        }

        async function setMessageReaction(messageId, emoji) {
            hideMessageContextMenu();
            if (!messageId || !emoji || !currentChatId) return;
            const result = await apiRequest('set_message_reaction', {
                chat_id: currentChatId,
                message_id: messageId,
                emoji
            });

                showModal('Ошибка', result.error || 'Не удалось поставить реакцию.');

        function quickHeartReaction(messageId) {
            setMessageReaction(messageId, '❤️');
        }

        function animateReactionOnMessage(messageId, emoji) {
            const bubble = document.getElementById(`message-bubble-${messageId}`);
            if (bubble) {
                bubble.classList.remove('reaction-pop');
                void bubble.offsetWidth;
                bubble.classList.add('reaction-pop');
            }
            if (!bubble) return;
            const rect = bubble.getBoundingClientRect();
            const fly = document.createElement('div');
            fly.className = 'reaction-fly';
            fly.textContent = emoji || '❤️';
            fly.style.left = `${rect.right - 20}px`;

            });

        function getSupportedMimeType(candidates) {
            if (!window.MediaRecorder) return '';
            for (const candidate of candidates) {
                if (MediaRecorder.isTypeSupported(candidate)) {
                    return candidate;
                }
            }
            return '';
        }

        async function requestMediaPermissions(showError = true) {
            if (mediaPermissionsGranted) {
                return true;
            }
            if (!window.isSecureContext) {
                if (showError) {
                    showModal('Нужен HTTPS', 'Для записи голосовых и кружков сайт должен быть открыт по HTTPS (или localhost).');
                }
                return false;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
                if (showError) {
                    showModal('Браузер не поддерживается', 'Ваш браузер не поддерживает запись через MediaRecorder.');
                }
                return false;
            }

            try {
                const permissionStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                stopMediaStream(permissionStream);
                mediaPermissionsGranted = true;
                return true;
            } catch (error) {
                mediaPermissionsGranted = false;
                if (showError) {
                    showModal('Нет доступа к камере/микрофону', 'Разрешите доступ к камере и микрофону в браузере, затем попробуйте снова.');
                }
                return false;
            }
        }

        function formatRecordTime(seconds) {
            const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function formatDurationSeconds(seconds) {
            const safe = Math.max(0, Math.floor(seconds || 0));
            const mins = String(Math.floor(safe / 60)).padStart(2, '0');
            const secs = String(safe % 60).padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function initAudioUi(audioId, durationId, progressId) {
            const audio = document.getElementById(audioId);
            const durationEl = document.getElementById(durationId);
            const progress = document.getElementById(progressId);
            if (!audio || !durationEl || !progress) return;
            durationEl.textContent = formatDurationSeconds(audio.duration);
            progress.value = '0';
            updateAudioProgressFill(progress);
        }

        function syncAudioProgress(audioId, progressId, durationId) {
            const audio = document.getElementById(audioId);
            const progress = document.getElementById(progressId);
            const durationEl = document.getElementById(durationId);
            if (!audio || !progress || !durationEl) return;
            if (audio.duration > 0) {
                progress.value = String((audio.currentTime / audio.duration) * 100);
            }
            updateAudioProgressFill(progress);
            const left = Math.max(0, audio.duration - audio.currentTime);
            durationEl.textContent = formatDurationSeconds(left);
        }

        function seekAudio(audioId, value, durationId) {
            const audio = document.getElementById(audioId);
            const durationEl = document.getElementById(durationId);
            if (!audio || !audio.duration) return;
            audio.currentTime = (Number(value) / 100) * audio.duration;
            const progress = document.getElementById(audioId.replace('audio-msg-', 'audio-progress-'));
            if (progress) {
                updateAudioProgressFill(progress);
            }
            if (durationEl) {
                durationEl.textContent = formatDurationSeconds(audio.duration - audio.currentTime);
            }
        }

        function toggleAudioPlayback(audioId, buttonId) {
            const audio = document.getElementById(audioId);
            const button = document.getElementById(buttonId);
            if (!audio || !button) return;
            if (audio.paused) {
                audio.play().catch(() => {});
                button.textContent = '⏸';
            } else {
                audio.pause();
                button.textContent = '▶';
            }
        }

        function resetAudioUi(audioId, buttonId, progressId) {
            const audio = document.getElementById(audioId);
            const button = document.getElementById(buttonId);
            const progress = document.getElementById(progressId);
            if (audio) {

            if (button) {

            if (!progressEl) return;
            const value = Number(progressEl.value || 0);

        function updateRecordButtonsState() {
            const mediaButton = document.getElementById('media-record-button');
            const voiceHint = document.getElementById('voice-record-hint');
            const voiceTimer = document.getElementById('voice-record-timer');

            const isRecording = isVoiceRecording || isVideoNoteRecording;
            if (mediaButton) {
                mediaButton.classList.toggle('recording', isRecording);
                mediaButton.classList.remove('ready');
                if (isRecording) {
                    mediaButton.textContent = '⏹️';
                } else {
                    mediaButton.textContent = mediaMode === 'voice' ? '🎤' : '⭕';
                }
            }

            if (voiceHint) {
                if (isRecording) {
                    if (mediaMode === 'video' && mediaRecordingLocked) {
                        voiceHint.textContent = 'Кружок записывается (зафиксировано). Нажмите ⏹️ для отправки.';
                    } else {
                        voiceHint.textContent = mediaMode === 'voice' ? 'Запись голосового...' : 'Запись кружка...';
                    }
                } else {
                    voiceHint.textContent = mediaMode === 'voice'
                        ? 'Зажмите 🎤, свайп вправо - отмена'
                        : 'Зажмите ⭕, вверх - фиксация, вправо - отмена';
                }
            }

            if (voiceTimer) {
                voiceTimer.classList.toggle('hidden', !isVoiceRecording);
            }

        function stopMediaStream(stream) {
            if (!stream) return;
            stream.getTracks().forEach(track => track.stop());
        }

        function clearRecordedMedia() {
            if (voiceRecorder && isVoiceRecording) {
                voiceRecorder.stop();
            }
            if (videoNoteRecorder && isVideoNoteRecording) {
                discardVideoOnStop = true;
                videoNoteRecorder.stop();
            }

            stopMediaStream(voiceStream);
            stopMediaStream(videoNoteStream);

            voiceRecorder = null;
            videoNoteRecorder = null;
            voiceStream = null;
            videoNoteStream = null;
            voiceChunks = [];
            videoNoteChunks = [];
            voiceBlob = null;
            videoNoteBlob = null;
            isVoiceRecording = false;
            isVideoNoteRecording = false;
            mediaRecordingLocked = false;
            mediaStopRequestedFromLock = false;
            stopVoiceTimer();
            stopVideoTimer();
            hideVideoPreview();
            if (mediaHoldStartTimeout) {
                clearTimeout(mediaHoldStartTimeout);
                mediaHoldStartTimeout = null;
            }
            updateRecordButtonsState();
        }

        async function toggleVoiceRecording() {
            const hasPermissions = mediaPermissionsGranted || await requestMediaPermissions(true);
            if (!hasPermissions) {
                return;
            }

            if (isVoiceRecording && voiceRecorder) {
                voiceRecorder.stop();
                return;
            }

            try {
                voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                voiceChunks = [];
                const mimeType = getSupportedMimeType([
                    'audio/webm;codecs=opus',
                    'audio/webm',
                    'audio/ogg;codecs=opus'
                ]);
                voiceRecorder = mimeType ? new MediaRecorder(voiceStream, { mimeType }) : new MediaRecorder(voiceStream);

                voiceRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        voiceChunks.push(event.data);
                    }
                };

                voiceRecorder.onstop = () => {
                    const type = voiceChunks[0]?.type || 'audio/webm';
                    voiceBlob = new Blob(voiceChunks, { type });
                    voiceRecordDurationMs = Date.now() - voiceRecordStartedAt;
                    voiceChunks = [];
                    isVoiceRecording = false;
                    mediaRecordingLocked = false;
                    stopVoiceTimer();
                    stopMediaStream(voiceStream);
                    voiceStream = null;
                    updateRecordButtonsState();
                    if (mediaCancelledBySwipe) {
                        mediaCancelledBySwipe = false;
                        voiceBlob = null;
                        return;
                    }
                    if (voiceRecordDurationMs < 1000) {
                        voiceBlob = null;
                        return;
                    }
                    sendRecordedMediaNow('voice', voiceBlob);
                };

                voiceRecorder.start();
                isVoiceRecording = true;
                startVoiceTimer();
                updateRecordButtonsState();
            } catch (error) {
                showModal('Нет доступа к микрофону', 'Разрешите доступ к микрофону, чтобы записать голосовое сообщение.');
            }
        }

        async function toggleVideoNoteRecording() {
            const hasPermissions = mediaPermissionsGranted || await requestMediaPermissions(true);
            if (!hasPermissions) {
                return;
            }

            if (isVideoNoteRecording && videoNoteRecorder) {
                videoNoteRecorder.stop();
                return;
            }

            try {
                videoNoteStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: preferredVideoFacingMode },
                    audio: true
                });
                showVideoPreview(videoNoteStream);
                videoNoteChunks = [];
                const mimeType = getSupportedMimeType([
                    'video/webm;codecs=vp8,opus',
                    'video/webm',
                    'video/mp4'
                ]);
                videoNoteRecorder = mimeType ? new MediaRecorder(videoNoteStream, { mimeType }) : new MediaRecorder(videoNoteStream);

                videoNoteRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        videoNoteChunks.push(event.data);
                    }
                };

                videoNoteRecorder.onstop = () => {
                    const type = videoNoteChunks[0]?.type || 'video/webm';
                    videoRecordDurationMs = Date.now() - videoRecordStartedAt;
                    videoNoteBlob = new Blob(videoNoteChunks, { type });
                    videoNoteChunks = [];
                    isVideoNoteRecording = false;
                    mediaRecordingLocked = false;
                    stopVideoTimer();
                    stopMediaStream(videoNoteStream);
                    videoNoteStream = null;
                    hideVideoPreview();
                    updateRecordButtonsState();
                    if (discardVideoOnStop || mediaCancelledBySwipe) {
                        discardVideoOnStop = false;
                        mediaCancelledBySwipe = false;
                        videoNoteBlob = null;
                        if (restartVideoAfterStop) {
                            restartVideoAfterStop = false;
                            setTimeout(() => toggleVideoNoteRecording(), 50);
                        }
                        return;
                    }
                    if (videoRecordDurationMs < 1000) {
                        videoNoteBlob = null;
                        return;
                    }
                    sendRecordedMediaNow('video', videoNoteBlob);
                };

                videoNoteRecorder.start();
                isVideoNoteRecording = true;
                startVideoTimer();
                updateRecordButtonsState();
            } catch (error) {
                showModal('Нет доступа к камере', 'Разрешите доступ к камере и микрофону, чтобы записать видео-кружок.');
            }
        }

        function toggleVideoNotePlayback(videoEl) {
            if (!videoEl) return;
            if (videoEl.paused) {
                videoEl.play().catch(() => {});
            } else {
                videoEl.pause();
            }
        }

        function toggleMediaMode() {
            const now = Date.now();
            if (now < suppressModeToggleUntil || isVoiceRecording || isVideoNoteRecording) {
                return;
            }
            mediaMode = mediaMode === 'voice' ? 'video' : 'voice';
            updateRecordButtonsState();
        }

        function startActiveMediaRecordingByHold(event) {
            event.preventDefault();
            const messageInput = document.getElementById('message-input');
            if (messageInput) {
                messageInput.blur();
            }
            mediaHoldStartedAt = Date.now();
            mediaPointerStartX = event.clientX || 0;
            mediaPointerStartY = event.clientY || 0;
            mediaCancelledBySwipe = false;
            mediaStopRequestedFromLock = false;
            if (mediaHoldStartTimeout) {
                clearTimeout(mediaHoldStartTimeout);
            }
            if (mediaRecordingLocked && (isVideoNoteRecording || isVoiceRecording)) {
                mediaStopRequestedFromLock = true;
                if (isVideoNoteRecording && videoNoteRecorder) {
                    videoNoteRecorder.stop();
                } else if (isVoiceRecording && voiceRecorder) {
                    voiceRecorder.stop();
                }
                return;
            }
            mediaHoldStartTimeout = setTimeout(() => {
                if (mediaMode === 'voice') {
                    startVoiceRecordingByHold(event);
                } else if (!isVideoNoteRecording && !isVoiceRecording) {
                    toggleVideoNoteRecording();
                }
                mediaHoldStartTimeout = null;
            }, 180);
        }

        function trackMediaHoldMove(event) {
            if (!isVoiceRecording && !isVideoNoteRecording) {
                return;
            }
            const deltaX = (event.clientX || 0) - mediaPointerStartX;
            const deltaY = (event.clientY || 0) - mediaPointerStartY;
            if (deltaX > 70) {
                mediaCancelledBySwipe = true;
                if (isVoiceRecording && voiceRecorder) {
                    voiceRecorder.stop();
                } else if (isVideoNoteRecording && videoNoteRecorder) {
                    discardVideoOnStop = true;
                    videoNoteRecorder.stop();
                }
            }
            if (mediaMode === 'video' && !mediaRecordingLocked && deltaY < -60) {
                mediaRecordingLocked = true;
                updateRecordButtonsState();
            }
        }

        function stopActiveMediaRecordingByHold(event) {
            event.preventDefault();
            if (mediaStopRequestedFromLock) {
                mediaStopRequestedFromLock = false;
                return;
            }
            if (mediaRecordingLocked) {
                return;
            }
            const holdDuration = Date.now() - mediaHoldStartedAt;
            if (mediaHoldStartTimeout) {
                clearTimeout(mediaHoldStartTimeout);
                mediaHoldStartTimeout = null;
                toggleMediaMode();
                return;
            }
            if (holdDuration > 120) {
                suppressModeToggleUntil = Date.now() + 250;
            }
            if (mediaMode === 'voice') {
                stopVoiceRecordingByHold(event);
            } else if (isVideoNoteRecording && videoNoteRecorder) {
                videoNoteRecorder.stop();
            }
        }

        async function switchVideoCamera() {
            preferredVideoFacingMode = preferredVideoFacingMode === 'user' ? 'environment' : 'user';
            if (isVideoNoteRecording && videoNoteStream) {
                const [track] = videoNoteStream.getVideoTracks();
                if (track && track.applyConstraints) {
                    try {
                        await track.applyConstraints({ facingMode: preferredVideoFacingMode });
                    } catch (error) {
                        if (videoNoteRecorder) {
                            discardVideoOnStop = true;
                            restartVideoAfterStop = true;
                            videoNoteRecorder.stop();
                        }
                    }
                } else if (videoNoteRecorder) {
                    discardVideoOnStop = true;
                    restartVideoAfterStop = true;
                    videoNoteRecorder.stop();
                }
            }
            const cameraButton = document.getElementById('composer-camera-switch');
            if (cameraButton) {
                cameraButton.textContent = preferredVideoFacingMode === 'user' ? '🤳' : '📷';
            }
        }

        function startVoiceRecordingByHold(event) {
            event.preventDefault();
            if (isVoiceRecording || isVideoNoteRecording) {
                return;
            }
            toggleVoiceRecording();
        }

        function stopVoiceRecordingByHold(event) {
            event.preventDefault();

        }

        async function createCommunity(type, name, description) {
            const action = type === 'channel' ? 'create_channel' : 'create_group';
            const result = await apiRequest(action, { name, description });
            
            if (result.success) {
                const communityType = type === 'channel' ? 'канал' : 'группу';
                showModal('Успех!', `Вы создали ${communityType} "${name}". Username: @${result.username}`, false, () => {
                    fetchChannels();
                    fetchGroups();
                    renderChannelsGroupsView();
                });
            } else {
                showModal('Ошибка', result.error || 'Не удалось создать сообщество.');
            }
        }

        async function joinCommunityByUsername(username) {
            const result = await apiRequest('get_channel_group_by_username', { username });
            
            if (result.success) {
                const action = result.type === 'channel' ? 'join_channel' : 'join_group';
                const joinResult = await apiRequest(action, { [`${result.type}_username`]: username });
                
                if (joinResult.success) {
                    const communityType = result.type === 'channel' ? 'канал' : 'группу';
                    showModal('Успех!', `Вы присоединились к ${communityType} "${result.data.name}".`, false, () => {
                        fetchChannels();
                        fetchGroups();
                        fetchChats();
                        renderChannelsGroupsView();
                    });
                } else {
                    showModal('Ошибка', joinResult.error || 'Не удалось присоединиться к сообществу.');
                }
            } else {
                showModal('Ошибка', result.error || 'Сообщество не найдено.');
            }
        }

        async function searchCommunities() {
            const query = document.getElementById('community-search-input').value.trim();
            const resultsContainer = document.getElementById('community-search-results');

            if (query.length < 2) {
                resultsContainer.innerHTML = '<p class="text-slate-400 text-center py-8">Начните вводить текст для поиска сообществ.</p>';
                return;
            }
            
            resultsContainer.innerHTML = '<p class="text-center py-4"><span class="loading-circle bg-white-accent"></span> Поиск...</p>';

            const result = await apiRequest('search_channels_groups', { query });
            
            if (result.success && result.results.length > 0) {
                const resultsHtml = result.results.map(community => {
                    const isChannel = community.type === 'channel';
                    const icon = isChannel ? '📢' : '👥';
                    const typeName = isChannel ? 'Канал' : 'Группа';
                    const joinAction = isChannel ? 
                        `joinCommunityByUsername('${community.username}')` : 
                        `joinCommunityByUsername('${community.username}')`;

                    return `
                        <div class="search-result-item">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center mr-3 text-lg">
                                    ${icon}
                                </div>
                                <div>
                                    <h4 class="font-bold">${community.name}</h4>
                                    <p class="text-sm text-slate-400">${typeName} • @${community.username}</p>
                                    <p class="text-xs text-slate-500">Участников: ${community.members?.length || 0}</p>
                                </div>
                            </div>
                            <button class="primary-button text-sm px-3 py-1" onclick="${joinAction}">
                                Присоединиться
                            </button>
                        </div>
                    `;
                }).join('');
                resultsContainer.innerHTML = resultsHtml;
            } else {
                resultsContainer.innerHTML = '<p class="text-red-400 text-center py-8">Сообщества не найдены.</p>';
            }
        }

        async function startChatFromUserProfile(userId, userName, userAvatar) {
            const chat = await apiRequest('create_private_chat', { target_user_id: userId });
            if (!chat.success) {
                showModal('Ошибка', chat.error || 'Не удалось открыть чат.');
                return;
            }
            switchScreen('chat_view', {
                chatId: chat.chat_id,
                chatName: userName,
                chatType: 'private',
                interlocutorId: userId,
                interlocutorAvatar: userAvatar
            });
        }

        async function startCallFromUserProfile(userId, userName, userAvatar, callType = 'voice') {
            const chat = await apiRequest('create_private_chat', { target_user_id: userId });
            if (!chat.success) {
                showModal('Ошибка', chat.error || 'Не удалось открыть чат.');
                return;
            }
            switchScreen('chat_view', {
                chatId: chat.chat_id,
                chatName: userName || 'Пользователь',
                chatType: 'private',
                interlocutorId: userId,
                interlocutorAvatar: userAvatar || '/data/avatars/default.png',
                isBotChat: false
            });
            setTimeout(() => initiateCall(chat.chat_id, callType), 180);
        }

        async function updateProfile() {
            const name = document.getElementById('display-name').value.trim();
            const bio = document.getElementById('profile-bio').value.trim();
            const avatarFile = document.getElementById('avatar-upload').files[0];
            const button = document.getElementById('update-button');

                return;
            }

            button.disabled = true;
            button.innerHTML = '<span class="loading-circle bg-white-accent"></span> Сохранение...';
            statusText.textContent = '';

            const formData = new FormData();
            formData.append('action', 'update_profile');

            formData.append('bio', bio);
            if (avatarFile) {
                formData.append('avatar', avatarFile);
            }

            if (result.success) {
                currentUser.name = name;
                currentUser.bio = bio;
                if (result.new_avatar) {

                }

                showModal('Успех!', `Профиль <strong>${name}</strong> обновлен.`, false, () => {
                    fetchChats().then(() => switchScreen('profile')); 
                });
            } else {
                showModal('Ошибка', result.error || 'Не удалось обновить профиль.');
                button.innerHTML = 'Сохранить изменения';
                button.disabled = false;
            }
        }

                                    <h4 class="font-bold text-lg">${gift.name}</h4>
                                    <p class="text-yellow-400 font-semibold mb-3">${gift.price} ⭐</p>
                                    <button class="primary-button w-full ${!canAfford ? 'disabled' : ''}" 
                                            onclick="attemptBuyGift('${key}', ${gift.price})"
                                            ${!canAfford ? 'disabled' : ''} >
                                        Купить (${gift.price} ⭐)
                                    </button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            document.getElementById('screen-container').innerHTML = `<div id="shop_screen_content" class="screen-content">${shopContent}</div>`;
        }

        async function buyPremium() {
            const result = await apiRequest('buy_premium');
            if (!result.success) {
                showModal('Ошибка', result.error || 'Не удалось купить Premium.');
                return;
            }
            currentUser.stars = result.new_stars;
            currentUser.is_premium = true;
            showModal('Успех', 'Pulse Premium активирован!');
            if (currentScreen === 'shop') {
                renderShopView();
            }
        }

        async function attemptBuyGift(giftKey, price) {
            showModal(
                'Подтверждение покупки', 
                `Вы хотите купить **${GIFTS_STORE[giftKey].emoji} ${GIFTS_STORE[giftKey].name}** за **${price} ⭐**?`, 
                true, 
                async () => {
                    const result = await apiRequest('buy_gift', { gift_key: giftKey });
                    if (result.success) {
                        currentUser.stars = result.new_stars;
                        if (!currentUser.gifts || typeof currentUser.gifts !== 'object') {
                            currentUser.gifts = {};
                        }
                        if (result.gift_id) {
                            currentUser.gifts[result.gift_id] = result.gift_emoji;
                        }
                        
                        showModal('Куплено!', `Вы купили ${result.gift_emoji} ${result.gift_name}. Ваш баланс: ${result.new_stars} ⭐.`);

                    } else {
                        showModal('Ошибка покупки', result.error || 'Не удалось купить подарок.');
                    }
                }
            );
        }

        function renderGiftsInventory(gifts) {
            if (!gifts || Object.keys(gifts).length === 0) {
                return '<p class="text-slate-400 text-sm">Ваш инвентарь подарков пуст.</p>';
            }

            const giftGroups = {};
            Object.entries(gifts).forEach(([giftId, giftEmoji]) => {
                const baseKey = Object.keys(GIFTS_STORE).find(key => 
                    GIFTS_STORE[key].emoji === giftEmoji
                );
                
                if (baseKey) {
                    if (!giftGroups[baseKey]) {
                        giftGroups[baseKey] = {
                            emoji: giftEmoji,
                            name: GIFTS_STORE[baseKey].name,
                            price: Math.floor(GIFTS_STORE[baseKey].price * 0.5), // 50% от цены покупки
                            count: 0,
                            ids: []
                        };
                    }
                    giftGroups[baseKey].count++;
                    giftGroups[baseKey].ids.push(giftId);
                }
            });

            return Object.entries(giftGroups).map(([baseKey, group]) => `
                <div class="inventory-item">
                    <div class="flex items-center">
                        <span class="text-2xl mr-3">${group.emoji}</span>
                        <div>
                            <h4 class="font-bold">${group.name}</h4>
                            <p class="text-sm text-slate-400">В инвентаре: x${group.count}</p>
                        </div>
                    </div>
                    <button class="primary-button bg-yellow-600 hover:bg-yellow-700 text-sm px-3 py-1"
                            onclick="attemptSellGift('${group.ids[0]}', ${group.price}, '${group.emoji}', '${group.name}')">
                        Продать (${group.price} ⭐)
                    </button>
                </div>
            `).join('');
        }

        function attemptSellGift(giftId, refundAmount, giftEmoji, giftName) {
            showModal(
                'Продать подарок?', 
                `Вы уверены, что хотите продать один <strong>${giftEmoji} ${giftName}</strong> за <strong>${refundAmount} ⭐</strong>?`, 
                true, 
                async () => {
                    const result = await apiRequest('sell_gift', { gift_id: giftId });
                    if (result.success) {
                        currentUser.stars = result.new_stars;
                        // Обновляем инвентарь
                        if (currentUser.gifts && currentUser.gifts[giftId]) {
                            delete currentUser.gifts[giftId];
                        }
                        
                        showModal('Продано!', `Вы продали ${giftEmoji} ${giftName}. Баланс: ${result.new_stars} ⭐.`, false, () => {
                            renderProfileView();
                        });
                    } else {
                        showModal('Ошибка продажи', result.error || 'Не удалось продать подарок.');
                    }
                }
            );
        }

        let currentScreen = 'loading';
        let currentChatData = {};
        let pendingScreenAnimation = null;
        let userProfileBackTarget = { screen: 'chats_list', data: {} };

        function getScreenAnimation(screenName, previousScreen) {
            const authScreens = ['welcome', 'setup'];
            const profileFlow = ['profile', 'edit_profile', 'settings', 'user_profile'];
            const contentFeed = ['news', 'notifications', 'channels_groups', 'shop'];

            if (authScreens.includes(screenName) || authScreens.includes(previousScreen)) {
                return { enterStart: 'screen-enter-fade-start', enterEnd: 'screen-enter-fade-end', leaveEnd: 'screen-leave-fade-end' };
            }
            if (profileFlow.includes(screenName) || profileFlow.includes(previousScreen)) {
                return { enterStart: 'screen-enter-up-start', enterEnd: 'screen-enter-up-end', leaveEnd: 'screen-leave-down-end' };
            }
            if (contentFeed.includes(screenName) || contentFeed.includes(previousScreen)) {
                return { enterStart: 'screen-enter-fade-start', enterEnd: 'screen-enter-fade-end', leaveEnd: 'screen-leave-fade-end' };
            }
            return { enterStart: 'screen-enter-right-start', enterEnd: 'screen-enter-right-end', leaveEnd: 'screen-leave-left-end' };
        }

        function renderAndAnimateNewScreen(screenName, data) {
            if (screenName === 'welcome') {
                renderWelcomeScreen();
            } else if (screenName === 'setup') {
                renderSetupScreen();
            } else if (screenName === 'calls') {
                renderCallsView();
            } else if (screenName === 'chats_list') {
                renderChatsList();
            } else if (screenName === 'chat_view') {
                renderChatView(data);
            } else if (screenName === 'profile') {
                renderProfileView();
            } else if (screenName === 'edit_profile') {
                renderEditProfileView();
            } else if (screenName === 'shop') {
                renderShopView();
            } else if (screenName === 'add_chat') {
                renderAddChatView();
            } else if (screenName === 'gift_search') {
                renderSearchUsersView('gift_search', data);
            } else if (screenName === 'notifications') {
                renderNotificationsView();
            } else if (screenName === 'news') {
                renderNewsView();
            } else if (screenName === 'channels_groups') {
                renderChannelsGroupsView();
            } else if (screenName === 'settings') {
                renderSettingsView();
            } else if (screenName === 'user_profile') {
                renderOtherUserProfileView(data);
            }
            
            const newScreenEl = document.getElementById('screen-container').firstElementChild;
            if (newScreenEl) {
                 const animation = pendingScreenAnimation || getScreenAnimation(screenName, currentScreen);
                 newScreenEl.classList.add(animation.enterStart);
                 void newScreenEl.offsetWidth; 
                 newScreenEl.classList.remove(animation.enterStart);
                 newScreenEl.classList.add(animation.enterEnd);
                 pendingScreenAnimation = null;
            }

            if (screenName === 'chats_list') {
                fetchChats();
            } else if (screenName === 'calls') {
                fetchCalls();
            } else if (screenName === 'chat_view') {
                fetchMessages(currentChatId, true);
            } else if (screenName === 'notifications') {
                fetchNotifications();
            } else if (screenName === 'news') {
                fetchNews();
            } else if (screenName === 'channels_groups') {
                fetchChannels();
                fetchGroups();
            }
            updateWsChatWatch();
        }

        function switchScreen(screenName, data = {}) {
            hideMessageContextMenu();
            cancelMessageHold();
            if (currentScreen === 'chat_view' && screenName !== 'chat_view') {
                sendTypingState(false);
            }
            if (screenName !== 'chat_view') {
                editingMessageId = null;
                replyingToMessage = null;
            }
            const tabBar = document.getElementById('tab-bar');
            const tabBarVisibleScreens = ['calls', 'chats_list', 'shop', 'profile'];
            if (!tabBarVisibleScreens.includes(screenName)) {
                tabBar.style.display = 'none';
            } else {
                tabBar.style.display = 'flex';
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.classList.remove('active-tab');
                    if (btn.getAttribute('data-tab') === screenName) {
                        btn.classList.add('active-tab');
                    } else if (screenName === 'edit_profile' && btn.getAttribute('data-tab') === 'profile') {
                         btn.classList.add('active-tab');
                    } else if (screenName === 'gift_search' && btn.getAttribute('data-tab') === 'shop') {
                         btn.classList.add('active-tab');
                    } else if (screenName === 'settings' && btn.getAttribute('data-tab') === 'profile') {
                         btn.classList.add('active-tab');
                    }
                });
            }
            
            const currentScreenEl = document.getElementById('screen-container').firstElementChild;
            const previousScreen = currentScreen;
            currentScreen = screenName;
            currentChatId = data.chatId || null;
            currentChatData = data;

            if (currentScreenEl && !['welcome', 'setup'].includes(previousScreen)) { 
                const animation = getScreenAnimation(screenName, previousScreen);
                pendingScreenAnimation = animation;
                currentScreenEl.classList.add(animation.leaveEnd);
                
                setTimeout(() => {
                    document.getElementById('screen-container').innerHTML = '';
                    renderAndAnimateNewScreen(screenName, data);
                }, 300);
            } else {
                pendingScreenAnimation = getScreenAnimation(screenName, previousScreen);
                document.getElementById('screen-container').innerHTML = '';
                renderAndAnimateNewScreen(screenName, data);
            }
        }

        async function fetchCurrentUser() {
            const authResult = await apiRequest('get_current_user');
            if (authResult.logged_in) {
                 currentUser = authResult.user;
            }
        }

        async function checkAuthAndRoute() {
            const authResult = await apiRequest('get_current_user');
            
            if (authResult.logged_in) {
                currentUser = authResult.user;
                if (currentUser.username) {
                    updateCachedAccountMeta(currentUser.username, currentUser.name || currentUser.username);
                }
                if (authResult.setup_needed) {
                    switchScreen('setup');
                } else {
                    switchScreen('chats_list');
                    ensureWebSocketConnected();
                    registerNotificationServiceWorker();
                    ensureNotificationPermission();
                    fetchNotifications();
                    fetchCalls();
                    handleJoinLinks();
                }
            } else {
                const autoLoggedIn = await tryAutoLoginFromCache();
                if (autoLoggedIn) {
                    return checkAuthAndRoute();
                }
                switchScreen('welcome');
            }
        }

        document.getElementById('tab-bar').addEventListener('click', (event) => {
            const tabButton = event.target.closest('.tab-button');
            if (tabButton) {
                if (tabButton.getAttribute('data-tab') === 'profile' && profileTabHoldOpened) {
                    profileTabHoldOpened = false;
                    return;
                }
                hideAccountQuickSheet();
                switchScreen(tabButton.getAttribute('data-tab'));
            }
        });

        const profileTabButton = document.getElementById('profile-tab-button');
        if (profileTabButton) {
            const startHold = () => {
                profileTabHoldOpened = false;
                if (profileTabHoldTimer) clearTimeout(profileTabHoldTimer);
                profileTabHoldTimer = setTimeout(() => {
                    profileTabHoldOpened = true;
                    showAccountQuickSheet();
                }, 420);
            };
            const cancelHold = () => {
                if (profileTabHoldTimer) {
                    clearTimeout(profileTabHoldTimer);
                    profileTabHoldTimer = null;
                }
            };
            profileTabButton.addEventListener('pointerdown', startHold);
            profileTabButton.addEventListener('pointerup', cancelHold);
            profileTabButton.addEventListener('pointerleave', cancelHold);
            profileTabButton.addEventListener('pointercancel', cancelHold);
        }

        // Блокируем масштабирование страницы, чтобы размер интерфейса оставался фиксированным
        window.addEventListener('wheel', (event) => {
            if (event.ctrlKey) {
                event.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('keydown', (event) => {
            if ((event.ctrlKey || event.metaKey) && ['+', '-', '=', '0'].includes(event.key)) {
                event.preventDefault();
            }
        });

        document.addEventListener('click', (event) => {
            const menu = document.getElementById('message-context-menu');
            if (!menu) return;
            if (!menu.contains(event.target)) {
                hideMessageContextMenu();
            }
            const quickSheet = document.getElementById('account-quick-sheet');
            if (quickSheet && !quickSheet.classList.contains('hidden')) {
                const tabBar = document.getElementById('tab-bar');
                const clickedInsideSheet = quickSheet.contains(event.target);
                const clickedProfileTab = tabBar?.contains(event.target) && event.target.closest('#profile-tab-button');
                if (!clickedInsideSheet && !clickedProfileTab) {
                    hideAccountQuickSheet();
                }
            }
        });

        document.addEventListener('touchstart', handleBackSwipeStart, { passive: true });
        document.addEventListener('touchend', handleBackSwipeEnd, { passive: true });

        checkAuthAndRoute();

    </script>
</body>
</html>
