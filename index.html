<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <title>Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #818CF8;
            --dark-bg: #0F172A;
            --dark-card: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
        }
        
        html, body, #app {
            height: 100%;
            width: 100%;
            min-width: 100vw;
            max-width: 100vw;
            min-height: 100vh;
            max-height: 100vh;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        #screen-container {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
        }

        .screen-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-in-out, opacity 0.25s ease-in-out;
            background-color: var(--dark-bg);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen-enter-right-start { transform: translateX(100%); opacity: 0.92; }
        .screen-enter-right-end { transform: translateX(0); opacity: 1; }
        .screen-leave-left-end { transform: translateX(-100%); opacity: 0.94; }

        .screen-enter-up-start { transform: translateY(18px); opacity: 0; }
        .screen-enter-up-end { transform: translateY(0); opacity: 1; }
        .screen-leave-down-end { transform: translateY(18px); opacity: 0; }

        .screen-enter-fade-start { transform: scale(0.985); opacity: 0; }
        .screen-enter-fade-end { transform: scale(1); opacity: 1; }
        .screen-leave-fade-end { transform: scale(1.01); opacity: 0; }

        .primary-button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: none;
            cursor: pointer;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .primary-button:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .primary-button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .secondary-button {
            background-color: var(--dark-card);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #334155;
            cursor: pointer;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .secondary-button:hover {
            background-color: #334155;
        }

        .active-tab {
            color: var(--primary);
            background-color: rgba(99, 102, 241, 0.1);
            border-radius: 0.75rem;
        }

        .loading-circle {
            display: inline-block;
            width: 1em;
            height: 1em;
            border-radius: 50%;
            border: 2px solid #fff;
            border-color: #fff transparent #fff transparent;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .messages-container {
            display: flex;
            flex-direction: column-reverse;
            overflow-y: auto;
            padding: 1rem;
            flex-grow: 1;
            -webkit-overflow-scrolling: touch;
        }
        
        .message-bubble {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1.2rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: anywhere;
            word-wrap: break-word;
            white-space: pre-wrap;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .message-incoming {
            background-color: var(--dark-card);
            align-self: flex-start;
            border-top-left-radius: 0.2rem;
        }

        .message-outgoing {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            align-self: flex-end;
            border-top-right-radius: 0.2rem;
        }
        
        .message-system {
            background-color: #475569;
            color: #CBD5E1;
            font-size: 0.8rem;
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            max-width: 100%;
            margin: 0.5rem auto;
            text-align: center;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            padding: 1rem;
            box-sizing: border-box;
        }
        .modal-content {
            background-color: var(--dark-card);
            padding: 1.5rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            -webkit-overflow-scrolling: touch;
        }

        .message-with-avatar {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .message-with-avatar .avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 0.75rem;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid var(--dark-card);
        }
        .message-with-avatar .bubble {
            max-width: calc(85% - 3.25rem);
        }

        .reply-preview {
            border-left: 3px solid var(--primary-light);
            background: rgba(99, 102, 241, 0.08);
            padding: 0.35rem 0.5rem;
            border-radius: 0.5rem;
            margin-bottom: 0.35rem;
            font-size: 0.75rem;
            color: #cbd5e1;
            max-width: 260px;
        }

        .composer-state {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.65rem;
            margin: 0 0.75rem;
            border-radius: 0.7rem;
            background: #0f172a;
            border: 1px solid #334155;
        }

        .context-menu {
            position: fixed;
            z-index: 80;
            min-width: 170px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            padding: 0.3rem;
        }

        .context-menu button {
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            color: #e2e8f0;
            border-radius: 0.55rem;
            padding: 0.45rem 0.55rem;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .context-menu button:hover {
            background: #1e293b;
        }

        .reaction-picker-row {
            display: flex;
            gap: 0.35rem;
            overflow-x: auto;
            padding: 0.15rem 0.1rem 0.35rem 0.1rem;
            margin-bottom: 0.2rem;
            border-bottom: 1px solid #334155;
        }

        .reaction-picker-row button {
            flex: 0 0 auto;
            width: auto;
            font-size: 1.05rem;
            padding: 0.3rem 0.45rem;
            text-align: center;
        }

        .message-reactions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.12rem;
            flex-wrap: wrap;
        }

        .reaction-chip {
            font-size: 0.74rem;
            border: 1px solid #475569;
            background: #0f172a;
            border-radius: 999px;
            padding: 0.08rem 0.42rem;
            color: #cbd5e1;
        }

        .reaction-pop {
            animation: reactionPulse 0.28s ease;
        }

        @keyframes reactionPulse {
            0% { transform: scale(1); }
            45% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .reaction-fly {
            position: fixed;
            z-index: 120;
            pointer-events: none;
            font-size: 1.5rem;
            animation: reactionFly 0.75s ease forwards;
        }

        @keyframes reactionFly {
            0% { transform: translateY(0) scale(0.95); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-28px) scale(1.15); opacity: 0; }
        }

        .message-media {
            max-width: 100%;
            border-radius: 0.9rem;
        }

        .voice-message-player-wrap {
            width: min(260px, 75vw);
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 16px;
            padding: 0.5rem 0.65rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            outline: none;
            box-shadow: none;
        }

        .voice-play-button {
            width: 30px;
            height: 30px;
            border-radius: 9999px;
            border: 1px solid #6366f1;
            background: #312e81;
            color: #e0e7ff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            outline: none;
            box-shadow: none;
            -webkit-tap-highlight-color: transparent;
        }

        .voice-play-button:focus,
        .voice-play-button:focus-visible {
            outline: none;
            box-shadow: none;
        }

        .voice-progress {
            flex: 1;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            height: 5px;
            border-radius: 999px;
            background: #475569;
            outline: none;
            box-shadow: none;
            border: none;
            -webkit-tap-highlight-color: transparent;
        }

        .voice-progress::-webkit-slider-runnable-track {
            height: 5px;
            border-radius: 999px;
            background: transparent;
        }

        .voice-progress::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 999px;
            background: #6366f1;
            border: 2px solid #1e293b;
            margin-top: -4.5px;
            box-shadow: none;
        }

        .voice-progress::-moz-range-track {
            height: 5px;
            border-radius: 999px;
            background: #475569;
            border: none;
        }

        .voice-progress::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 999px;
            background: #6366f1;
            border: 2px solid #1e293b;
            box-shadow: none;
        }

        .voice-progress:focus,
        .voice-progress:focus-visible {
            outline: none;
            box-shadow: none;
        }

        .voice-duration {
            min-width: 38px;
            text-align: right;
            font-size: 0.75rem;
            color: #e2e8f0;
            flex-shrink: 0;
        }

        .voice-message-player-wrap.outgoing {
            background: #312e81;
            border-color: #6366f1;
        }

        .voice-message-player-wrap.outgoing .voice-play-button {
            background: #4338ca;
            border-color: #a5b4fc;
            color: #eef2ff;
        }

        .video-note-player {
            width: min(220px, 72vw);
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            object-fit: cover;
            border: none;
            background-color: #0f172a;
            display: block;
            outline: none;
            box-shadow: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0 auto;
        }

        .video-note-bubble {
            background: transparent !important;
            padding: 0 !important;
            box-shadow: none !important;
            max-width: none !important;
        }

        .media-record-button {
            width: 52px;
            height: 52px;
            border-radius: 9999px;
            border: 1px solid #334155;
            color: #a5b4fc;
            background-color: #1e293b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .media-record-button:hover {
            background-color: #334155;
        }

        .media-record-button.recording {
            color: #fecaca;
            background-color: #b91c1c;
            border-color: #ef4444;
            animation: pulse-record 1.2s infinite;
        }

        .media-record-button.ready {
            color: #bbf7d0;
            background-color: #166534;
            border-color: #22c55e;
        }

        .send-circle-button {
            width: 52px;
            height: 52px;
            border-radius: 9999px;
            padding: 0;
            margin-left: 0.5rem;
            font-size: 1.05rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .record-timer {
            min-width: 56px;
            text-align: center;
            font-size: 0.75rem;
            color: #fca5a5;
            background: #450a0a;
            border: 1px solid #7f1d1d;
            border-radius: 9999px;
            padding: 0.25rem 0.5rem;
        }

        .record-hint {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-right: 0.4rem;
            white-space: nowrap;
        }

        .video-note-preview-wrap {
            position: fixed;
            top: 84px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            background: transparent;
            z-index: 45;
            pointer-events: none;
        }

        .video-note-preview-wrap.active {
            display: flex;
            pointer-events: auto;
        }

        .video-note-preview {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: none;
            background-color: #020617;
        }

        .camera-switch-button {
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
        }

        .composer-camera-switch-button {
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        #message-form {
            position: relative;
        }

        .composer-camera-switch-button.tg-position {
            position: absolute;
            left: 0.75rem;
            bottom: calc(100% + 0.55rem);
            z-index: 20;
        }

        .account-switcher {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.75rem;
        }

        .account-switcher-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.5rem 0.7rem;
            border-radius: 0.6rem;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            margin-top: 0.45rem;
        }

        .account-switcher-item.active {
            border-color: #6366f1;
            background: #1e1b4b;
        }

        .account-switcher-remove {
            color: #fca5a5;
            margin-left: 0.5rem;
            font-size: 0.75rem;
        }

        @media (min-width: 768px) {
            .composer-camera-switch-button {
                display: none !important;
            }
        }

        @keyframes pulse-record {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .input-field {
            background-color: var(--dark-card);
            border: 1px solid #334155;
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            width: 100%;
            transition: all 0.2s;
            font-size: 16px; /* Предотвращает zoom на iOS */
            min-height: 44px;
            box-sizing: border-box;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .input-field::placeholder {
            color: #64748B;
        }

        .card {
            background-color: var(--dark-card);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #334155;
        }

        .avatar-preview {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--dark-card);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .tab-bar {
            background: transparent;
            border-top: none;
            padding: 0.35rem 0.45rem calc(0.55rem + env(safe-area-inset-bottom));
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            backdrop-filter: none;
            display: flex;
            justify-content: center;
        }

        .tab-bar-inner {
            display: flex;
            justify-content: center;
            gap: 0.55rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 1.05rem;
            padding: 0.45rem;
            width: min(96vw, 420px);
        }

        .tab-button {
            flex: 1;
            border-radius: 0.8rem;
            color: #94a3b8;
            transition: all 0.2s ease;
            min-height: 64px;
            padding: 0.55rem 0.65rem;
            font-size: 0.85rem;
        }

        .tab-button.active-tab {
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.16);
        }

        .account-quick-sheet {
            position: fixed;
            left: 50%;
            bottom: calc(72px + env(safe-area-inset-bottom));
            transform: translateX(-50%);
            width: min(92vw, 380px);
            max-height: 52vh;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(2, 6, 23, 0.55);
            z-index: 75;
            backdrop-filter: blur(18px);
            padding: 0.75rem;
        }

        .call-control-off {
            text-decoration: line-through;
            opacity: 0.75;
            transform: scale(0.95);
        }

        .call-controls-bottom {
            position: absolute;
            left: 50%;
            bottom: calc(1.2rem + env(safe-area-inset-bottom));
            transform: translateX(-50%);
            display: flex;
            gap: 0.75rem;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 999px;
            padding: 0.6rem 0.75rem;
        }

        .call-floating-banner {
            position: fixed;
            bottom: calc(0.6rem + env(safe-area-inset-bottom) + 78px);
            left: 0.75rem;
            right: 0.75rem;
            z-index: 90;
            background: #22c55e;
            color: #052e16;
            border-radius: 0.9rem;
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.25);
            cursor: pointer;
        }

        .message-day-separator {
            text-align: center;
            margin: 0.75rem 0;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .call-floating-banner .meta {
            font-size: 0.75rem;
            opacity: 0.85;
            font-weight: 600;
        }

        .call-floating-end {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            border: none;
            background: #dc2626;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            background-color: var(--dark-card);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
            min-height: 60px;
        }
        .chat-item:hover {
            background-color: #334155;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .stories-strip {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.35rem;
            margin-bottom: 0.8rem;
        }

        .story-chip {
            min-width: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .story-chip-avatar {
            width: 58px;
            height: 58px;
            border-radius: 9999px;
            border: 2px solid #6366f1;
            object-fit: cover;
            margin-bottom: 0.25rem;
        }

        .gift-item {
            background: linear-gradient(135deg, var(--dark-card), #1E293B);
            border-radius: 1rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
            transition: all 0.2s;
        }
        .gift-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .inventory-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            background-color: var(--dark-card);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid #334155;
            flex-wrap: wrap;

        function canUseBackSwipe() {
            return isTouchPhoneLike() && ['chat_view', 'user_profile', 'settings', 'add_chat', 'channels_groups'].includes(currentScreen);
        }

        function handleBackSwipeStart(event) {
            if (!canUseBackSwipe()) return;
            if (!event.touches || event.touches.length !== 1) return;
            const touch = event.touches[0];
            backSwipeStartX = touch.clientX;
            backSwipeStartY = touch.clientY;
            // Жест назад только от левого края как в Telegram
            backSwipeTracking = backSwipeStartX <= 28;
        }

        function handleBackSwipeEnd(event) {
            if (!backSwipeTracking || !canUseBackSwipe()) {
                backSwipeTracking = false;
                return;
            }
            if (!event.changedTouches || event.changedTouches.length === 0) {
                backSwipeTracking = false;
                return;
            }

            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - backSwipeStartX;
            const deltaY = Math.abs(touch.clientY - backSwipeStartY);
            backSwipeTracking = false;

            const isHorizontalBackSwipe = deltaX > 95 && deltaY < 70 && deltaX > (deltaY * 1.2);
            if (!isHorizontalBackSwipe) return;

            if (currentScreen === 'chat_view') {
                switchScreen('chats_list');
            } else if (currentScreen === 'user_profile') {
                goBackFromUserProfile();
            } else if (currentScreen === 'settings') {
                switchScreen('profile');
            } else if (currentScreen === 'add_chat' || currentScreen === 'channels_groups') {
                switchScreen('chats_list');
            }
        }

        function getAccountCache() {
            try {
                const parsed = JSON.parse(localStorage.getItem(ACCOUNT_CACHE_KEY) || '{}');
                const accounts = Array.isArray(parsed.accounts) ? parsed.accounts : [];
                return {
                    activeUsername: parsed.activeUsername || '',
                    accounts
                };
            } catch (error) {
                return { activeUsername: '', accounts: [] };
            }
        }

        function setAccountCache(cache) {
            localStorage.setItem(ACCOUNT_CACHE_KEY, JSON.stringify(cache));
        }

        function rememberAccount(username, password, name = '') {
            if (!username || !password) return;
            const cache = getAccountCache();
            const normalized = username.toLowerCase();
            const filtered = cache.accounts.filter(acc => acc.username !== normalized);
            filtered.unshift({
                username: normalized,
                password,
                name: name || normalized,
                lastUsed: Date.now()
            });
            cache.accounts = filtered.slice(0, ACCOUNT_CACHE_LIMIT);
            cache.activeUsername = normalized;
            setAccountCache(cache);
        }

        function updateCachedAccountMeta(username, name = '') {
            if (!username) return;
            const normalized = username.toLowerCase();
            const cache = getAccountCache();
            const account = cache.accounts.find(acc => acc.username === normalized);
            if (!account) return;
            account.lastUsed = Date.now();
            if (name) account.name = name;
            cache.activeUsername = normalized;
            cache.accounts.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
            setAccountCache(cache);
        }

        function getActiveCachedAccount() {
            const cache = getAccountCache();
            if (!cache.accounts.length) return null;
            return cache.accounts.find(acc => acc.username === cache.activeUsername) || cache.accounts[0];
        }

        function removeRememberedAccount(username) {
            const normalized = String(username || '').toLowerCase();
            const cache = getAccountCache();
            cache.accounts = cache.accounts.filter(acc => acc.username !== normalized);
            if (cache.activeUsername === normalized) {
                cache.activeUsername = cache.accounts[0]?.username || '';
            }
            setAccountCache(cache);
        }

        async function loginWithCachedAccount(username) {
            const cache = getAccountCache();
            const normalized = String(username || '').toLowerCase();
            const account = cache.accounts.find(acc => acc.username === normalized);
            if (!account) {
                showModal('Ошибка', 'Аккаунт не найден в кэше.');
                return false;
            }

            const result = await apiRequest('register_login', {
                username: account.username,
                password: account.password,
                skip_2fa_for_cached: '1'
            });
            if (!result.success) {
                removeRememberedAccount(account.username);
                showModal('Ошибка', `Не удалось войти в @${account.username}. Аккаунт удален из кэша: ${result.error || 'неверные данные'}`);
                return false;
            }

            rememberAccount(account.username, account.password, result.name || account.name);
            return true;
        }

        async function apiRequest(action, data = {}, isForm = false) {
            const url = '/index.php';
            const headers = isForm ? {} : { 'Content-Type': 'application/x-www-form-urlencoded' };

            if (!isForm) {
                const params = new URLSearchParams({ action, ...data }).toString();
                data = params;
            }

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: isForm ? data : new URLSearchParams(data)
                });
                
                if (response.status === 500) {
                    const text = await response.text();
                    throw new Error("Server Error 500: " + text.substring(0, 200) + "...");
                }
                
                const result = await response.json();

                // Проверка на блокировку в ответе от сервера
                if (result.success === false && result.error && result.error.includes("заблокирован")) {
                    showModal('Блокировка', result.error, false, () => logout());
                    return { success: false, error: result.error };
                }

                return result;

            } catch (error) {
                console.error('API Request Error:', error);
                showModal('Ошибка сети или сервера', error.message || 'Произошла ошибка при обращении к серверу.');
                return { success: false, error: error.message };
            }
        }

        function getWebSocketUrl() {
            const explicit = (window.PULSE_WS_URL || '').trim();
            if (explicit) {
                return explicit;
            }
            const fromStorage = (localStorage.getItem('pulse_ws_url') || '').trim();
            if (fromStorage) {
                return fromStorage;
            }
            const host = window.location.hostname.toLowerCase();
            if (host === 'pulse-online.ru' || host === 'www.pulse-online.ru') {
                const pulseProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                return `${pulseProtocol}//186.246.1.195:8081`;
            }
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${protocol}//${host}:8081`;
        }

        function ensureWebSocketConnected() {
            if (!currentUser?.id) return;
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                return;
            }
            connectWebSocket();
        }

        function connectWebSocket() {
            try {
                ws = new WebSocket(getWebSocketUrl());
            } catch (error) {
                scheduleWsReconnect();
                return;
            }

            ws.onopen = () => {
                wsReconnectAttempts = 0;
                ws.send(JSON.stringify({ type: 'auth', user_id: currentUser.id }));
                if (currentChatId) {
                    ws.send(JSON.stringify({ type: 'watch_chat', chat_id: currentChatId }));
                }
            };

            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.type === 'message_created') {
                        fetchChats();
                        if (currentChatId && payload.chat_id === currentChatId) {
                            fetchMessages(currentChatId, true);
                        }
                        if (!document.hasFocus()) {
                            showBrowserNotification('Новое сообщение', 'Вам пришло новое сообщение в Pulse');
                        }
                    } else if (payload.type === 'call_created') {
                        fetchCalls();
                        fetchNotifications();
                        if (!document.hasFocus()) {
                            showBrowserNotification('Входящий звонок', 'Кто-то пытается вам позвонить');
                        }
                    } else if (payload.type === 'rtc_signal') {
                        handleRtcSignal(payload);
                    } else if (payload.type === 'message_updated' || payload.type === 'message_deleted') {
                        fetchChats();
                        if (currentChatId && payload.chat_id === currentChatId) {
                            fetchMessages(currentChatId, false);
                        }
                    } else if (payload.type === 'message_reaction') {
                        if (currentChatId && payload.chat_id === currentChatId) {
                            fetchMessages(currentChatId, false);
                        }
                    } else if (payload.type === 'chat_list_changed') {
                        fetchChats();
                    } else if (payload.type === 'notification_created') {
                        fetchNotifications();
                        if (!document.hasFocus()) {
                            const notifTitle = payload.title || 'Новое уведомление';
                            const notifMessage = payload.message || 'У вас новое событие в Pulse';
                            showBrowserNotification(notifTitle, notifMessage);
                        }
                    } else if (payload.type === 'message_read') {
                        if (currentChatId && payload.chat_id === currentChatId) {
                            fetchMessages(currentChatId, false);
                        } else {
                            fetchChats();
                        }
                    } else if (payload.type === 'user_presence') {
                        presenceMap[payload.user_id] = {
                            is_online: Boolean(payload.is_online),
                            last_seen: payload.timestamp || Math.floor(Date.now() / 1000)
                        };
                        updateChatPresenceUI();
                    } else if (payload.type === 'typing') {
                        typingMap[payload.chat_id] = {
                            user_id: payload.from_user_id,
                            is_typing: Boolean(payload.is_typing),
                            at: Date.now()
                        };
                        updateChatPresenceUI();
                    }
                } catch (error) {
                    console.error('WS parse error:', error);
                }
            };

            ws.onclose = () => {
                scheduleWsReconnect();
            };

            ws.onerror = () => {
                if (ws) {
                    ws.close();
                }
            };
        }

        function scheduleWsReconnect() {
            if (wsReconnectTimer || !currentUser?.id) return;
            wsReconnectAttempts += 1;
            const timeoutMs = Math.min(10000, 1000 * wsReconnectAttempts);
            wsReconnectTimer = setTimeout(() => {
                wsReconnectTimer = null;
                ensureWebSocketConnected();
            }, timeoutMs);
        }

        function updateWsChatWatch() {
            if (!ws || ws.readyState !== WebSocket.OPEN || !currentUser?.id) return;
            ws.send(JSON.stringify({ type: 'watch_chat', chat_id: currentChatId || '' }));
        }

        function sendTypingState(isTyping) {
            if (!currentChatId || currentChatData.chatType !== 'private' || !currentChatData.interlocutorId) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({
                type: 'typing',
                to_user_id: currentChatData.interlocutorId,
                chat_id: currentChatId,
                is_typing: Boolean(isTyping)
            }));
        }

        async function ensureNotificationPermission() {
            if (!('Notification' in window)) return false;
            if (Notification.permission === 'granted') return true;
            if (Notification.permission === 'denied') return false;
            if (localStorage.getItem('pulse_notif_requested_v1') === '1') {
                return false;
            }
            localStorage.setItem('pulse_notif_requested_v1', '1');
            const permission = await Notification.requestPermission();
            return permission === 'granted';
        }

        async function registerNotificationServiceWorker() {
            if (!('serviceWorker' in navigator)) return null;
            try {
                const reg = await navigator.serviceWorker.register('/sw.js');
                return reg;
            } catch (_) {
                return null;
            }
        }

        async function showBrowserNotification(title, body) {
            if (!('Notification' in window)) return;
            if (Notification.permission !== 'granted') return;
            try {
                const reg = await navigator.serviceWorker.getRegistration();
                if (reg && reg.showNotification) {
                    await reg.showNotification(title, {
                        body,
                        icon: '/data/avatars/default.png',
                        badge: '/data/avatars/default.png',
                        tag: `pulse-${Date.now()}`,
                        renotify: false,
                        data: { url: window.location.href }
                    });
                    return;
                }
                new Notification(title, { body, icon: '/data/avatars/default.png' });
            } catch (_) {}
        }

        async function checkUsername() {
            const username = document.getElementById('username').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const button = document.getElementById('auth-button');

            if (username.length < 3 || password.length < 6) {
                document.getElementById('auth-message').textContent = 'Логин (3+ символов) и пароль (6+ символов) обязательны.';
                document.getElementById('auth-message').classList.remove('text-green-400');
                document.getElementById('auth-message').classList.add('text-red-400');
                return;
            }

            const originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = '<span class="loading-circle bg-white-accent"></span> Проверка...';

            const result = await apiRequest('check_username', { username });

            if (result.success) {
                if (result.exists) {
                    document.getElementById('auth-message').textContent = `Пользователь @${username} найден. Нажмите, чтобы войти.`;
                    document.getElementById('auth-message').classList.remove('text-red-400');
                    document.getElementById('auth-message').classList.add('text-green-400');
                    button.innerHTML = 'Войти';
                    loginStage = 'login';
                } else {
                    document.getElementById('auth-message').textContent = `Пользователь @${username} не найден. Нажмите, чтобы зарегистрироваться.`;
                    document.getElementById('auth-message').classList.remove('text-red-400');
                    document.getElementById('auth-message').classList.add('text-green-400');
                    button.innerHTML = 'Зарегистрироваться';
                    loginStage = 'register';
                }
            } else {
                showModal('Ошибка', result.error || 'Произошла ошибка при проверке логина.');
                button.innerHTML = originalText;
            }

            button.disabled = false;
        }

        async function registerLogin() {
            const username = document.getElementById('username').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const button = document.getElementById('auth-button');

            if (username.length < 3 || password.length < 6) {
                document.getElementById('auth-message').textContent = 'Логин (3+ символов) и пароль (6+ символов) обязательны.';
                return;
            }

            const originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = '<span class="loading-circle bg-white-accent"></span> Вход...';

            const result = await apiRequest('register_login', { username, password });

            if (result.success) {
                rememberAccount(username, password, result.name || username);
                if (result.status === '2fa_required' || result.two_factor_required) {
                    showTwoFactorPrompt();
                    button.innerHTML = originalText;
                    button.disabled = false;
                    return;
                } else if (result.status === 'login') {
                    showModal('Добро пожаловать!', `С возвращением, <strong>${result.name}</strong>!`, false, () => {
                        checkAuthAndRoute();
                    });
                } else if (result.status === 'register_new') {
                    showModal('Добро пожаловать!', `Аккаунт @${username} успешно зарегистрирован. Пожалуйста, завершите настройку профиля.`, false, () => {
                        checkAuthAndRoute();
                    });
                }
            } else {
                showModal('Ошибка', result.error || 'Не удалось войти/зарегистрироваться.');
                button.innerHTML = originalText;
                button.disabled = false;
            }
        }

        async function initiateCall(chatId, callType = 'voice') {
            ensureWebSocketConnected();
            const result = await apiRequest('create_call', { chat_id: chatId, call_type: callType });
            if (!result.success) {
                showModal('Ошибка звонка', result.error || 'Не удалось начать звонок.');
                return;
            }
            activeCallPeer = {
                id: result.peer_id,
                name: result.peer_name
            };
            activeCallChatId = chatId;
            activeCallType = callType;
            await startRealtimeCall(true);
            fetchCalls();
            fetchNotifications();
        }

        function buildRtcConfig() {
            return {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            };
        }

        async function sendRtcSignal(toUserId, signal, meta = {}, attempt = 0) {
            if (!toUserId) return;
            const payload = {
                type: 'rtc_signal',
                to_user_id: toUserId,
                chat_id: activeCallChatId,
                call_type: activeCallType,
                signal,
                meta
            };
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                ensureWebSocketConnected();
                if (attempt >= 12) {
                    console.warn('RTC signal dropped: WS not open', payload.signal?.type || 'unknown');
                    return;
                }
                setTimeout(() => sendRtcSignal(toUserId, signal, meta, attempt + 1), 250);
                return;
            }
            ws.send(JSON.stringify(payload));
        }

        async function startRealtimeCall(isInitiator, remoteOffer = null) {
            if (!activeCallPeer?.id) return;
            await prepareCallMedia(activeCallType);
            openCallOverlay(activeCallPeer.name || 'Звонок', isInitiator ? 'Вызов...' : 'Подключение...');
            persistCurrentCallState();

            rtcPeerConnection = new RTCPeerConnection(buildRtcConfig());
            rtcRemoteStream = new MediaStream();

            const remoteVideo = document.getElementById('call-remote-video');
            if (remoteVideo) {
                remoteVideo.srcObject = rtcRemoteStream;
            }

            rtcLocalStream.getTracks().forEach(track => rtcPeerConnection.addTrack(track, rtcLocalStream));
            rtcPeerConnection.ontrack = (event) => {
                event.streams[0].getTracks().forEach(track => rtcRemoteStream.addTrack(track));
                const status = document.getElementById('call-status');
                if (status) status.textContent = 'На связи';
                if (event.track?.kind === 'video') {
                    document.getElementById('call-remote-video')?.classList.remove('hidden');
                    const remotePlaceholder = document.getElementById('call-remote-placeholder');
                    if (remotePlaceholder) remotePlaceholder.classList.add('hidden');
                }
                activeCallStartedAt = Date.now();
                persistCurrentCallState();
                startCallTimer();
                updateFloatingCallBanner();
            };
            rtcPeerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendRtcSignal(activeCallPeer.id, { type: 'ice_candidate', candidate: event.candidate });
                }
            };
            rtcPeerConnection.onconnectionstatechange = () => {
                const status = document.getElementById('call-status');
                if (!status) return;
                const state = rtcPeerConnection?.connectionState || '';
                if (state === 'connected') status.textContent = 'На связи';
                if (state === 'disconnected' || state === 'failed' || state === 'closed') {
                    status.textContent = 'Звонок завершен';
                    stopCallTimer();
                }
            };

            if (isInitiator) {
                const offer = await rtcPeerConnection.createOffer();
                await rtcPeerConnection.setLocalDescription(offer);
                await sendRtcSignal(activeCallPeer.id, { type: 'offer', sdp: offer }, { caller_name: currentUser.name || currentUser.username || 'Пользователь' });
            } else if (remoteOffer) {
                await rtcPeerConnection.setRemoteDescription(new RTCSessionDescription(remoteOffer));
                const answer = await rtcPeerConnection.createAnswer();
                await rtcPeerConnection.setLocalDescription(answer);
                await sendRtcSignal(activeCallPeer.id, { type: 'answer', sdp: answer });
            }
        }

        async function prepareCallMedia(callType) {
            const constraints = {
                audio: true,
                video: callType === 'video'
            };
            rtcLocalStream = await navigator.mediaDevices.getUserMedia(constraints);
            const localVideo = document.getElementById('call-local-video');
            if (localVideo) {
                localVideo.srcObject = rtcLocalStream;
                localVideo.classList.toggle('hidden', callType !== 'video');
            }
            const remoteVideo = document.getElementById('call-remote-video');
            if (remoteVideo) {
                remoteVideo.classList.add('hidden');
            }
        }

        function openCallOverlay(title, statusText) {
            const overlay = document.getElementById('call-overlay');
            const titleEl = document.getElementById('call-title');
            const status = document.getElementById('call-status');
            const avatar = document.getElementById('call-peer-avatar');
            const placeholder = document.getElementById('call-remote-placeholder');
            if (titleEl) titleEl.textContent = title || 'Звонок';
            if (status) status.textContent = statusText || 'Подключение...';
            if (avatar) {
                const peerChat = chatsData.find(c => c.other_id === activeCallPeer?.id);
                avatar.src = peerChat?.avatar || '/data/avatars/default.png';
            }
            if (placeholder) placeholder.classList.remove('hidden');
            isCallOverlayMinimized = false;
            updateCallControlButtons();
            updateFloatingCallBanner();
            overlay?.classList.remove('hidden');
        }

        async function handleRtcSignal(payload) {
            const signal = payload.signal || {};
            const fromUserId = payload.from_user_id;
            const callType = payload.call_type || 'voice';
            const chatId = payload.chat_id || '';
            const callerName = payload.meta?.caller_name || 'Пользователь';

            if (signal.type === 'offer') {
                if (rtcPeerConnection) {
                    await sendRtcSignal(fromUserId, { type: 'busy' });
                    return;
                }
                pendingIncomingCall = { fromUserId, callType, chatId, callerName, offer: signal.sdp };
                localStorage.setItem('pulse_pending_call_v1', JSON.stringify(pendingIncomingCall));
                const peerChat = chatsData.find(c => c.other_id === fromUserId);
                const avatar = peerChat?.avatar || '/data/avatars/default.png';
                const nameEl = document.getElementById('incoming-call-name');
                const typeEl = document.getElementById('incoming-call-type');
                const avatarEl = document.getElementById('incoming-call-avatar');
                if (nameEl) nameEl.textContent = callerName;
                if (typeEl) typeEl.textContent = callType === 'video' ? 'Видеозвонок' : 'Голосовой звонок';
                if (avatarEl) avatarEl.src = avatar;
                document.getElementById('incoming-call-overlay')?.classList.remove('hidden');
                updateFloatingCallBanner();
                return;
            }

            if (!rtcPeerConnection) return;
            if (signal.type === 'answer' && signal.sdp) {
                await rtcPeerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp));
            } else if (signal.type === 'ice_candidate' && signal.candidate) {
                try {
                    await rtcPeerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate));
                } catch (_) {}
            } else if (signal.type === 'hangup') {
                endActiveCall(false);
            } else if (signal.type === 'busy') {
                const status = document.getElementById('call-status');
                if (status) status.textContent = 'Пользователь занят';
                setTimeout(() => endActiveCall(false), 900);
            }
        }

        function toggleLocalMute() {
            if (!rtcLocalStream) return;
            isLocalMuted = !isLocalMuted;
            rtcLocalStream.getAudioTracks().forEach(t => {
                t.enabled = !isLocalMuted;
            });
            updateCallControlButtons();
        }

        function toggleLocalCamera() {
            if (!rtcLocalStream) return;
            isLocalCameraOff = !isLocalCameraOff;
            rtcLocalStream.getVideoTracks().forEach(t => {
                t.enabled = !isLocalCameraOff;
            });
            updateCallControlButtons();
        }

        function updateCallControlButtons() {
            const muteBtn = document.getElementById('call-mute-btn');
            const cameraBtn = document.getElementById('call-camera-btn');
            if (muteBtn) {
                muteBtn.classList.toggle('call-control-off', isLocalMuted);
                muteBtn.title = isLocalMuted ? 'Микрофон выключен' : 'Микрофон включен';
            }
            if (cameraBtn) {
                cameraBtn.classList.toggle('call-control-off', isLocalCameraOff);
                cameraBtn.title = isLocalCameraOff ? 'Камера выключена' : 'Камера включена';
            }

        function formatCallDuration(ms) {
            const total = Math.max(0, Math.floor(ms / 1000));
            const mm = String(Math.floor(total / 60)).padStart(2, '0');
            const ss = String(total % 60).padStart(2, '0');
            return `${mm}:${ss}`;
        }

        function updateCallDurationUi() {
            const durationEl = document.getElementById('call-duration');
            const floatingMeta = document.getElementById('call-floating-meta');
            const value = activeCallStartedAt ? formatCallDuration(Date.now() - activeCallStartedAt) : '00:00';
            if (durationEl) durationEl.textContent = value;
            if (floatingMeta) {
                floatingMeta.textContent = pendingIncomingCall ? 'Входящий звонок' : value;
            }
        }

        function startCallTimer() {
            stopCallTimer();
            updateCallDurationUi();
            activeCallTimerInterval = setInterval(updateCallDurationUi, 1000);
        }

        function stopCallTimer() {
            if (activeCallTimerInterval) {
                clearInterval(activeCallTimerInterval);
                activeCallTimerInterval = null;
            }
            updateCallDurationUi();
        }

        function updateFloatingCallBanner() {
            const banner = document.getElementById('call-floating-banner');
            const title = document.getElementById('call-floating-title');
            if (!banner || !title) return;
            if (!activeCallPeer?.id || !isCallOverlayMinimized) {
                banner.classList.add('hidden');
                return;
            }
            title.textContent = `Разговор: ${activeCallPeer.name || 'Пользователь'}`;
            banner.classList.remove('hidden');
            updateCallDurationUi();
        }

        function minimizeCallOverlay() {
            isCallOverlayMinimized = true;
            document.getElementById('call-overlay')?.classList.add('hidden');
            updateFloatingCallBanner();
        }

        function openActiveCallOverlay() {
            if (!activeCallPeer?.id) return;
            document.getElementById('call-overlay')?.classList.remove('hidden');
            isCallOverlayMinimized = false;
            updateFloatingCallBanner();
        }

        function persistCurrentCallState() {
            if (!activeCallPeer?.id) return;
            localStorage.setItem('pulse_active_call_v1', JSON.stringify({
                peer_id: activeCallPeer.id,
                peer_name: activeCallPeer.name || 'Пользователь',
                chat_id: activeCallChatId,
                call_type: activeCallType,
                started_at: activeCallStartedAt || 0
            }));
        }

        function restoreCallFromStorage() {
            try {
                const pendingRaw = localStorage.getItem('pulse_pending_call_v1');
                if (pendingRaw) {
                    const pending = JSON.parse(pendingRaw);
                    if (pending?.fromUserId && pending?.offer) {
                        pendingIncomingCall = pending;
                    }
                }
                const activeRaw = localStorage.getItem('pulse_active_call_v1');
                if (activeRaw && !activeCallPeer) {
                    const parsed = JSON.parse(activeRaw);
                    if (parsed?.peer_id) {
                        activeCallPeer = { id: parsed.peer_id, name: parsed.peer_name || 'Пользователь' };
                        activeCallChatId = parsed.chat_id || '';
                        activeCallType = parsed.call_type || 'voice';
                        activeCallStartedAt = parsed.started_at || 0;
                        startCallTimer();
                    }
                }
            } catch (_) {}
            updateFloatingCallBanner();
        }

        async function acceptIncomingCall() {
            if (!pendingIncomingCall) return;
            const incoming = pendingIncomingCall;
            pendingIncomingCall = null;
            localStorage.removeItem('pulse_pending_call_v1');
            document.getElementById('incoming-call-overlay')?.classList.add('hidden');
            activeCallPeer = { id: incoming.fromUserId, name: incoming.callerName };
            activeCallChatId = incoming.chatId;
            activeCallType = incoming.callType;
            await startRealtimeCall(false, incoming.offer);
        }

        function rejectIncomingCall() {
            if (!pendingIncomingCall) return;
            sendRtcSignal(pendingIncomingCall.fromUserId, { type: 'hangup' });
            pendingIncomingCall = null;
            localStorage.removeItem('pulse_pending_call_v1');
            document.getElementById('incoming-call-overlay')?.classList.add('hidden');
            updateFloatingCallBanner();
        }

        function cleanupCallMedia() {
            if (rtcPeerConnection) {
                rtcPeerConnection.onicecandidate = null;
                rtcPeerConnection.ontrack = null;
                rtcPeerConnection.close();
            }
            rtcPeerConnection = null;
            if (rtcLocalStream) {
                rtcLocalStream.getTracks().forEach(t => t.stop());
            }
            rtcLocalStream = null;
            rtcRemoteStream = null;
            const localVideo = document.getElementById('call-local-video');
            const remoteVideo = document.getElementById('call-remote-video');
            if (localVideo) {
                localVideo.srcObject = null;
                localVideo.classList.add('hidden');
            }
            if (remoteVideo) {
                remoteVideo.srcObject = null;
                remoteVideo.classList.add('hidden');
            }
        }

        function endActiveCall(sendHangup = true) {
            if (pendingIncomingCall && !activeCallPeer?.id) {
                sendRtcSignal(pendingIncomingCall.fromUserId, { type: 'hangup' });
            }
            if (sendHangup && activeCallPeer?.id) {
                sendRtcSignal(activeCallPeer.id, { type: 'hangup' });
            }
            cleanupCallMedia();
            document.getElementById('call-overlay')?.classList.add('hidden');
            document.getElementById('incoming-call-overlay')?.classList.add('hidden');
            activeCallPeer = null;
            activeCallChatId = '';
            activeCallType = 'voice';
            incomingCallOffer = null;
            pendingIncomingCall = null;
            isLocalMuted = false;
            isLocalCameraOff = false;
            isCallOverlayMinimized = false;
            activeCallStartedAt = 0;
            stopCallTimer();
            localStorage.removeItem('pulse_pending_call_v1');
            localStorage.removeItem('pulse_active_call_v1');
            updateCallControlButtons();
            updateFloatingCallBanner();
        }

        async function openUserStories(userId) {
            const result = await apiRequest('get_user_stories', { user_id: userId });

            const user = result.user || {};

            if (!stories.length) {

                    showModal('Ваша история', 'У вас пока нет активных историй. Хотите опубликовать новую?', true, () => showCreateStoryModal());
                } else {
                    showModal('Истории', 'У пользователя нет активных историй.');
                }
                return;
            }
            storyViewerStories = stories;
            storyViewerIndex = 0;
            storyViewerUserName = user.name || 'Пользователь';
            renderStoryViewer();
            document.getElementById('story-viewer').classList.remove('hidden');
        }

        function renderStoryViewer() {
            const container = document.getElementById('story-viewer-content');
            const progress = document.getElementById('story-viewer-progress');
            if (!container || !progress || !storyViewerStories.length) return;
            const story = storyViewerStories[storyViewerIndex];
            const percent = ((storyViewerIndex + 1) / storyViewerStories.length) * 100;
            progress.style.width = `${percent}%`;

            container.innerHTML = `
                <div class="w-full max-w-md mx-auto text-white">
                    <p class="text-sm text-slate-300 mb-2">${storyViewerUserName}</p>
                    <div class="bg-black rounded-2xl overflow-hidden border border-slate-700">
                        ${story.media_type === 'image' && story.media_path
                            ? `<img src="${story.media_path}" class="w-full max-h-[68vh] object-contain" alt="story">`
                            : ''
                        }
                        ${story.media_type === 'video' && story.media_path
                            ? `<video src="${story.media_path}" class="w-full max-h-[68vh]" playsinline controls autoplay muted></video>`
                            : ''
                        }
                        ${story.content ? `<p class="p-3 text-sm whitespace-pre-wrap">${story.content}</p>` : ''}
                        <p class="px-3 pb-3 text-xs text-slate-400">${new Date((story.created_at || 0) * 1000).toLocaleString()}</p>
                    </div>
                </div>
            `;
        }

        function storyViewerNext() {
            if (!storyViewerStories.length) return;
            if (storyViewerIndex >= storyViewerStories.length - 1) {
                closeStoryViewer();
                return;
            }
            storyViewerIndex += 1;
            renderStoryViewer();
        }

        function storyViewerPrev() {
            if (!storyViewerStories.length) return;
            if (storyViewerIndex <= 0) return;
            storyViewerIndex -= 1;
            renderStoryViewer();

                }

                if (shouldScroll && messagesContainer) {
                    messagesContainer.scrollTop = 0;
                }
            } else {
                console.error('Ошибка загрузки сообщений:', result.error);
            }
        }

        function isSameDay(tsA, tsB) {
            const a = new Date(tsA * 1000);
            const b = new Date(tsB * 1000);
            return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
        }

        function formatMessageDayLabel(timestamp) {
            const d = new Date(timestamp * 1000);
            const now = new Date();
            const yesterday = new Date();
            yesterday.setDate(now.getDate() - 1);
            if (isSameDay(timestamp, Math.floor(now.getTime() / 1000))) return 'Сегодня';
            if (isSameDay(timestamp, Math.floor(yesterday.getTime() / 1000))) return 'Вчера';
            return d.toLocaleDateString();
        }

        function formatPresenceText(userId) {
            const presence = presenceMap[userId];
            if (!presence) return 'Оффлайн';
            if (presence.is_online) return 'В сети';
            if (!presence.last_seen) return 'Оффлайн';
            return `Был(а) в сети ${new Date(presence.last_seen * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        }

        function updateChatPresenceUI() {
            const presenceEl = document.getElementById('chat-presence-status');
            if (!presenceEl || currentChatData.chatType !== 'private' || !currentChatData.interlocutorId) return;
            const typingState = typingMap[currentChatId];
            if (typingState && typingState.is_typing && typingState.user_id === currentChatData.interlocutorId && (Date.now() - (typingState.at || 0) < 5000)) {
                presenceEl.textContent = 'Печатает...';
                presenceEl.classList.remove('text-slate-400');
                presenceEl.classList.add('text-emerald-400');
                return;
            }
            presenceEl.textContent = formatPresenceText(currentChatData.interlocutorId);
            presenceEl.classList.remove('text-emerald-400');
            presenceEl.classList.add('text-slate-400');
        }

        function renderMessages(messages) {
            const list = document.getElementById('message-list');
            if (!list) return [];

            const isScrolledToBottom = list.scrollTop < 10;
            const oldScrollHeight = list.scrollHeight;
            
            messages.reverse(); 

            const otherParticipantId = currentChatData.chatType === 'private' ? currentChatData.interlocutorId : '';
            let previousTimestamp = 0;

            const messagesHtml = messages.map(message => {
                const isSystem = message.type === 'system' || message.type === 'system_gift';
                const isSecurity = message.type === 'security';
                const isOutgoing = message.sender_id === currentUser.id;
                const isBot = message.sender_id === 'security_bot';
                const showDaySeparator = !previousTimestamp || !isSameDay(previousTimestamp, message.timestamp || 0);
                previousTimestamp = message.timestamp || previousTimestamp;
                const daySeparator = showDaySeparator ? `<div class="message-day-separator">${formatMessageDayLabel(message.timestamp || Math.floor(Date.now() / 1000))}</div>` : '';

                if (isSystem) {
                    return `${daySeparator}<div class="message-bubble message-system text-center italic mt-2">${message.content}</div>`;
                }

                let content = message.content;
                if (message.type === 'photo') {
                    content = `<img src="${message.file_path}" alt="Фото" class="message-media max-w-full rounded-lg" onclick="window.open(this.src)">`;
                } else if (message.type === 'audio') {
                    const audioId = `audio-msg-${message.id}`;
                    const progressId = `audio-progress-${message.id}`;
                    const durationId = `audio-duration-${message.id}`;
                    const playBtnId = `audio-play-${message.id}`;
                    const wrapClass = `voice-message-player-wrap ${isOutgoing ? 'outgoing' : 'incoming'}`;
                    content = `
                        <div class="${wrapClass}">
                            <audio id="${audioId}" preload="metadata" src="${message.file_path}"
                                onloadedmetadata="initAudioUi('${audioId}', '${durationId}', '${progressId}')"
                                ontimeupdate="syncAudioProgress('${audioId}', '${progressId}', '${durationId}')"
                                onended="resetAudioUi('${audioId}', '${playBtnId}', '${progressId}')"></audio>
                            <button type="button" id="${playBtnId}" class="voice-play-button"
                                onclick="toggleAudioPlayback('${audioId}', '${playBtnId}')">▶</button>
                            <input id="${progressId}" class="voice-progress" type="range" min="0" max="100" value="0"
                                oninput="seekAudio('${audioId}', this.value, '${durationId}')">
                            <span id="${durationId}" class="voice-duration">00:00</span>
                        </div>
                    `;
                } else if (message.type === 'video_note') {
                    content = `<video playsinline preload="metadata" class="video-note-player" src="${message.file_path}" onclick="toggleVideoNotePlayback(this)" onended="this.currentTime=0"></video>`;
                }
                if (message.forwarded_from) {
                    const fwdName = message.forwarded_from.sender_name || 'Пользователь';
                    content = `<div class="reply-preview"><strong>Переслано</strong><br>от ${fwdName}</div>${content}`;
                }
                if (message.reply_preview) {
                    const previewSender = message.reply_preview.sender_name || 'Пользователь';
                    const previewContent = message.reply_preview.content || '';
                    content = `<div class="reply-preview"><strong>${previewSender}</strong><br>${previewContent}</div>${content}`;
                }
                const bubbleExtraClass = (message.type === 'video_note' || message.type === 'audio') ? ' video-note-bubble' : '';
                
                const senderName = isOutgoing ? 'Вы' : (message.sender_name || 'Неизвестный');
                let bubbleClass = isOutgoing ? 'message-outgoing' : 'message-incoming';
                

                if (isSecurity) {
                    bubbleClass += ' security-message';
                }

                const containerClass = isOutgoing ? 'flex justify-end' : 'message-with-avatar';
                
                const showAvatar = (currentChatData.chatType === 'channel' || currentChatData.chatType === 'group' || isBot) && !isOutgoing;
                const safeMessageId = String(message.id || '').replace(/'/g, "\\'");
                const safeContent = String(message.content || '').replace(/'/g, "\\'").replace(/\n/g, '\\n');
                const safeSenderName = String(senderName).replace(/'/g, "\\'");
                const safeMessageType = String(message.type || 'text').replace(/'/g, "\\'");
                const holdAttrs = `onpointerdown="startMessageHold(event, '${safeMessageId}', '${safeContent}', ${isOutgoing}, '${safeSenderName}', '${safeMessageType}')" onpointerup="cancelMessageHold()" onpointerleave="cancelMessageHold()" ondblclick="quickHeartReaction('${safeMessageId}')"`; 
                const editedLabel = message.edited ? '<span class="text-xs text-slate-500 ml-1">(изменено)</span>' : '';
                const isReadByPeer = isOutgoing && otherParticipantId && Array.isArray(message.read_by) && message.read_by.includes(otherParticipantId);
                const checks = isOutgoing ? `<span class="ml-1 ${isReadByPeer ? 'text-blue-400' : 'text-slate-500'}">${isReadByPeer ? '✓✓' : '✓'}</span>` : '';
                const reactions = message.reactions && typeof message.reactions === 'object'
                    ? `<div class="message-reactions">${Object.entries(message.reactions).map(([emoji, users]) => {
                        const count = Array.isArray(users) ? users.length : 0;
                        if (!count) return '';
                        return `<button class="reaction-chip" onclick="event.stopPropagation(); setMessageReaction('${safeMessageId}', '${String(emoji).replace(/'/g, "\\'")}')">${emoji} ${count}</button>`;
                    }).join('')}</div>`
                    : '';

                let html = '';
                if (showAvatar) {
                    html = `
                        <div class="${containerClass}">
                            <img src="${message.sender_avatar}" alt="Аватар" class="avatar" ${!isBot ? `onclick="openUserProfileScreen('${message.sender_id}')"` : ''}>
                            <div class="flex flex-col">
                                <p class="text-xs font-semibold mb-1 text-slate-400">${senderName}</p>
                                <div id="message-wrap-${safeMessageId}" class="flex flex-col ${isOutgoing ? 'items-end' : 'items-start'}">
                                    <div id="message-bubble-${safeMessageId}" class="message-bubble ${bubbleClass}${bubbleExtraClass} shadow-md" ${holdAttrs}>${content}</div>
                                    ${reactions}
                                </div>
                                <span class="text-xs text-slate-500 mt-1">${new Date(message.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}${editedLabel}${checks}</span>
                            </div>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="${isOutgoing ? 'flex justify-end' : 'flex justify-start'}">
                            <div class="flex flex-col">
                                <div id="message-wrap-${safeMessageId}" class="flex flex-col ${isOutgoing ? 'items-end' : 'items-start'}">
                                    <div id="message-bubble-${safeMessageId}" class="message-bubble ${bubbleClass}${bubbleExtraClass} shadow-md" ${holdAttrs}>${content}</div>
                                    ${reactions}
                                </div>
                                <span class="text-xs text-slate-500 mt-1 ${isOutgoing ? 'text-right' : 'text-left'}">${new Date(message.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}${editedLabel}${checks}</span>
                            </div>
                        </div>
                    `;
                }
                return `${daySeparator}${html}`;
            }).join('');

            list.innerHTML = messagesHtml;
            
            const newScrollHeight = list.scrollHeight;
            const scrollDifference = newScrollHeight - oldScrollHeight;

            if (isScrolledToBottom) {
                list.scrollTop = 0;
            } else {
                if (scrollDifference > 0) {
                    list.scrollTop = list.scrollTop + scrollDifference;
                } 
            }

            return messagesHtml;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const fileInput = document.getElementById('photo-upload');
            const content = input.value.trim();
            const photoFile = fileInput.files[0];
            const sendButton = document.querySelector('#message-form button[type="submit"]');

            if (editingMessageId && !photoFile && !voiceBlob && !videoNoteBlob) {
                await editMessage(editingMessageId, content);
                input.value = '';
                editingMessageId = null;
                renderComposerState();
                return;
            }

            if (!content && !photoFile && !voiceBlob && !videoNoteBlob) {
                showModal('Ошибка', 'Сообщение не может быть пустым.');
                return;
            }
            
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading-circle bg-white-accent"></span>';

            const formData = new FormData();
            formData.append('action', 'send_message');
            formData.append('chat_id', currentChatId);
            formData.append('content', content);
            if (replyingToMessage?.messageId) {
                formData.append('reply_to', replyingToMessage.messageId);
            }
            if (photoFile) {
                formData.append('photo', photoFile);
            }
            if (voiceBlob) {
                formData.append('audio', voiceBlob, 'voice-message.webm');
            }
            if (videoNoteBlob) {
                formData.append('video_note', videoNoteBlob, 'video-note.webm');
            }
            
            const result = await apiRequest('send_message', formData, true);

            if (result.success) {
                input.value = '';
                fileInput.value = '';
                sendTypingState(false);
                document.getElementById('photo-filename-label').textContent = '🖼️';
                voiceBlob = null;
                videoNoteBlob = null;
                updateRecordButtonsState();
                replyingToMessage = null;
                renderComposerState();
            } else {
                // Проверяем, не связана ли ошибка с блокировкой
                if (result.error && result.error.includes('заблокирован')) {
                    showModal('Аккаунт заблокирован', result.error, false, () => {
                        logout();
                    });
                } else {
                    showModal('Ошибка', result.error || 'Не удалось отправить сообщение.');
                }
            }
            
            sendButton.disabled = false;
            sendButton.textContent = '➤';
        }

        function handleMessageInputTyping(value) {
            if (currentChatData.chatType !== 'private') return;
            const isTyping = String(value || '').trim().length > 0;
            sendTypingState(isTyping);
            if (typingStopTimer) {
                clearTimeout(typingStopTimer);
                typingStopTimer = null;
            }
            if (isTyping) {
                typingStopTimer = setTimeout(() => sendTypingState(false), 1800);

        }

        async function sendRecordedMediaNow(kind, blob) {
            if (!blob || !currentChatId) return;
            if (kind === 'voice') {
                voiceBlob = blob;
                videoNoteBlob = null;
            } else {
                videoNoteBlob = blob;
